services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - cloud-lab-net

  api:
    build:
      context: ./api
      target: dev
    env_file: .env
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
    volumes:
      - ./api/src:/app/src
      - ./api/prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    networks:
      - cloud-lab-net

  keycloak:
    image: keycloak/keycloak:26.0
    command: start-dev --import-realm
    env_file: .env
    environment:
      - KC_HOSTNAME=http://auth.localhost
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/cloudlab?currentSchema=keycloak
      - KC_DB_USERNAME=cloudlab
      - KC_DB_PASSWORD=cloudlab_dev
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.localhost`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - cloud-lab-net

  web:
    build:
      context: ./web
      target: dev
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`localhost`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=5173"
    networks:
      - cloud-lab-net

  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cloud-lab-net

networks:
  cloud-lab-net:
    driver: bridge

volumes:
  pgdata:
